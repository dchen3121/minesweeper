<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D2D2D"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A4A4A"/>
      <stop offset="100%" stop-color="#2A2A2A"/>
    </linearGradient>
    <radialGradient id="shine" cx="0.35" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#666666" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#333333" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>

  <!-- Spikes -->
  <g stroke="#3A3A3A" stroke-width="28" stroke-linecap="round">
    <line x1="512" y1="160" x2="512" y2="310"/>
    <line x1="512" y1="714" x2="512" y2="864"/>
    <line x1="160" y1="512" x2="310" y2="512"/>
    <line x1="714" y1="512" x2="864" y2="512"/>
    <line x1="263" y1="263" x2="370" y2="370"/>
    <line x1="654" y1="654" x2="761" y2="761"/>
    <line x1="761" y1="263" x2="654" y2="370"/>
    <line x1="370" y1="654" x2="263" y2="761"/>
  </g>

  <!-- Spike tips (circles at ends) -->
  <g fill="#3A3A3A">
    <circle cx="512" cy="152" r="24"/>
    <circle cx="512" cy="872" r="24"/>
    <circle cx="152" cy="512" r="24"/>
    <circle cx="872" cy="512" r="24"/>
    <circle cx="255" cy="255" r="24"/>
    <circle cx="769" cy="769" r="24"/>
    <circle cx="769" cy="255" r="24"/>
    <circle cx="255" cy="769" r="24"/>
  </g>

  <!-- Mine body -->
  <circle cx="512" cy="512" r="200" fill="url(#bodyGrad)"/>
  <circle cx="512" cy="512" r="200" fill="url(#shine)"/>

  <!-- Highlight/glint -->
  <ellipse cx="455" cy="450" rx="50" ry="35" fill="white" opacity="0.25" transform="rotate(-25 455 450)"/>

  <!-- Red accent ring -->
  <circle cx="512" cy="512" r="205" fill="none" stroke="#CC3333" stroke-width="6" opacity="0.7"/>
</svg>
